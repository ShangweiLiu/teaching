<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <!-- Shaft: long horizontal handle going left to right -->
  <line x1="8" y1="110" x2="145" y2="110"
        stroke="#8B5E3C" stroke-width="12" stroke-linecap="round"/>
  <!-- Shaft tape wrap (grip detail) -->
  <line x1="8" y1="110" x2="45" y2="110"
        stroke="#2D2D2D" stroke-width="12" stroke-linecap="round" stroke-dasharray="6,4"/>
  <!-- Transition curve from shaft to blade -->
  <path d="M 145,110 Q 162,110 168,92 L 185,22"
        fill="none" stroke="#8B5E3C" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Blade face (flat bottom of blade) -->
  <path d="M 165,95 L 190,95 Q 196,95 196,102 Q 196,110 190,112 L 162,115"
        fill="#6B4423" stroke="#4A2F1A" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
